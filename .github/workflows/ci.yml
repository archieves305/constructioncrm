name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Placeholder values so src/lib/env.ts zod validation passes at build time.
      # Real secrets live in the deployment platform; CI only needs these to
      # satisfy required-field checks.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXTAUTH_URL: http://localhost:4000
      NEXTAUTH_SECRET: ci_placeholder_secret_ci_placeholder_secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build
